<!DOCTYPE html>
<html>
<head>
    <title>Peta Pertanahan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity=
    "sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
    crossorigin=""></script>
    <style type="text/css">
        #map {
            position: absolute;
            right:0;left:0;bottom:0;top:0;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script type="text/javascript">
    var map = L.map('map').setView([-7.0503218,110.4356382], 10);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

</script>
</body>
</html>
